name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: true

      - name: Use Node.js 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test
        env:
          QT4_TESTS_DIR: ${{ github.workspace }}/qt4tests
