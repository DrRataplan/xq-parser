name: Update XQuery4 EBNFs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js latest
      uses: actions/setup-node@v4
      with:
        node-version: node
        cache: 'npm'
    - run: npm ci
    - name: Download XQuery 4 grammar
      run: curl https://raw.githubusercontent.com/GuntherRademacher/rex-parser-generator/main/docs/sample-grammars/XQuery-40.ebnf > ./rawgrammars/XQuery-40.ebnf
    - name: Apply changes on XQuery 4 grammar
      run: node --experimental-strip-types ./src/index.ts ./rawgrammars/XQuery-40.ebnf > transformedgrammars/XQuery-40-full.ebnf

    - name: Detect changes to grammar
      id: has-changes
      run: |
        if git diff-files --quiet ./transformedgrammars/XQuery-40-full.ebnf ./rawgrammars/XQuery-40.ebnf; then
          echo "has-diff=false" >> $GITHUB_OUTPUT
        else
          echo "has-diff=true" >> $GITHUB_OUTPUT
        fi

    - name: Stop if the result is the same
      if: steps.has-changes.outputs.has-diff == 'false'
      run: |
        gh run cancel ${{ github.run_id }}
        gh run watch ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Add the new grammar changes
      run: |
        git add ./transformedgrammars/XQuery-40-full.ebnf
        git add ./rawgrammars/XQuery-40.ebnf

    - name: Install REx parser
      run: |
        git clone https://github.com/GuntherRademacher/rex-parser-generator.git
        cd rex-parser-generator
        rex/scripts/build-gpp.sh
        ls rex/build/bin

    - run: pwd
    - run: ls rex-parser-generator/rex/build/bin

    - name: Run REx parser to make the new parser
      run: |
        ./rex-parser-generator/rex/build/bin/rex -typescript ./transformedgrammars/XQuery-40-full.ebnf -glalr 1 -a pi -tree
        cat parser_header.txt ./XQuery-40-full.ts > parsers/XQuery-40-full.ts
        rm ./XQuery-40-full.ts

    - name: Stage generated parser
      run: git add ./parsers/XQuery-40-full.ts

    - name: Make a branch and commit
      run: |
        BRANCH_NAME=feat/update-parser-`date +"%d-%m-%y"`
        git config --global user.email "bot@elliat.nl"
        git config --global user.name "Bot"
        git checkout -b $BRANCH_NAME
        git commit -m "feat(parser): update parser to the newest spec"
        git push origin -u $BRANCH_NAME
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Create pull request
      run: gh pr create --title "feat(parser): update XQ40 parser to latest spec" --body "Automated update of the XQuery 4.0 grammar and generated parser."
      env:
        GH_TOKEN: ${{ github.token }}
